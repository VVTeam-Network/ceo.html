<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Panou Administrator | VV</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --bg-base: #0A0A0C;
            --surface: rgba(255, 255, 255, 0.04);
            --surface-hover: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.08);
            --primary: #0A84FF;
            --danger: #FF453A;
            --success: #32D74B;
            --text-main: #FFFFFF;
            --text-sec: #8E8E93;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        body { background-color: var(--bg-base); color: var(--text-main); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* HEADER TACTIC */
        header { background: rgba(10, 10, 12, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 15px 24px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-box { width: 36px; height: 36px; background: #fff; color: #000; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-weight: 800; font-size: 16px; letter-spacing: -1px; }
        .sys-status { font-size: 12px; color: var(--success); display: flex; align-items: center; gap: 6px; font-weight: 500; letter-spacing: 0.5px; text-transform: uppercase; }
        .dot-pulse { width: 6px; height: 6px; background: var(--success); border-radius: 50%; box-shadow: 0 0 8px var(--success); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        /* GRID LAYOUT */
        .main-grid { display: grid; grid-template-columns: 320px 1fr 300px; height: calc(100vh - 67px); }

        /* PANOU STANGA - GENERATOR CHEI & NOTIFICARI */
        .side-panel { border-right: 1px solid var(--border); background: rgba(255,255,255,0.01); display: flex; flex-direction: column; }
        .panel-header { padding: 16px 20px; border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 600; color: var(--text-sec); text-transform: uppercase; letter-spacing: 1px; }
        .panel-content { padding: 20px; overflow-y: auto; flex-grow: 1; }
        
        .control-group { margin-bottom: 24px; }
        .control-group label { display: block; font-size: 11px; color: var(--text-sec); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-size: 13px; font-weight: 500; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: #0070E0; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-main); }
        .btn-outline:hover { background: var(--surface); }

        .input-dark { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border); padding: 12px; border-radius: 8px; color: #fff; font-size: 13px; margin-bottom: 10px; outline: none; transition: 0.2s; }
        .input-dark:focus { border-color: var(--primary); }

        .key-list { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; }
        .key-item { background: var(--surface); border: 1px solid var(--border); padding: 12px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; font-family: monospace; font-size: 13px; cursor: pointer; transition: 0.2s; }
        .key-item:hover { background: var(--surface-hover); border-color: var(--primary); }
        .key-item.used { opacity: 0.5; text-decoration: line-through; cursor: default; }
        .key-badge { font-size: 9px; padding: 2px 6px; border-radius: 4px; font-family: 'Inter', sans-serif; font-weight: 600; }
        .badge-premium { background: rgba(10, 132, 255, 0.2); color: var(--primary); border: 1px solid rgba(10,132,255,0.3); }

        /* CENTRU - HARTA */
        .map-container { position: relative; background: #050505; }
        #admin-map { width: 100%; height: 100%; z-index: 1; }
        
        /* PIN-URI TACTICE PT HARTA (Poze primite) */
        .tactical-pin { width: 20px; height: 20px; background: var(--danger); border-radius: 50%; border: 3px solid #fff; box-shadow: 0 0 15px var(--danger); animation: pinPulse 2s infinite; }
        @keyframes pinPulse { 0% { transform: scale(1); box-shadow: 0 0 10px rgba(255, 69, 58, 0.8); } 50% { transform: scale(1.2); box-shadow: 0 0 20px rgba(255, 69, 58, 0.4); } 100% { transform: scale(1); box-shadow: 0 0 10px rgba(255, 69, 58, 0.8); } }

        /* PANOU DREAPTA - INCOMING FEED */
        .feed-panel { border-left: 1px solid var(--border); background: rgba(255,255,255,0.01); display: flex; flex-direction: column; }
        .feed-list { padding: 12px; overflow-y: auto; flex-grow: 1; display: flex; flex-direction: column; gap: 12px; }
        
        .feed-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; transition: 0.3s; }
        .feed-item:hover { border-color: var(--text-sec); }
        
        /* POZE MAI MICI SI COMPACTE IN FEED */
        .feed-img-box { width: 100%; height: 110px; background: #111; position: relative; }
        .feed-img-box img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }
        .urgent-tag { position: absolute; top: 8px; right: 8px; background: var(--danger); color: #fff; font-size: 9px; font-weight: 700; padding: 4px 6px; border-radius: 4px; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 2px 10px rgba(255,69,58,0.5); }
        
        .feed-details { padding: 10px; }
        .feed-agent { font-size: 11px; color: var(--text-sec); display: flex; justify-content: space-between; margin-bottom: 6px; font-family: monospace; }
        .feed-msg { font-size: 12px; color: #fff; line-height: 1.3; word-wrap: break-word; }
        .feed-actions { display: flex; gap: 6px; margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.05); }
        .btn-action { flex: 1; background: rgba(255,255,255,0.05); border: none; padding: 6px; border-radius: 6px; color: var(--text-sec); font-size: 11px; cursor: pointer; transition: 0.2s; }
        .btn-action:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .btn-action.del:hover { background: rgba(255,69,58,0.1); color: var(--danger); }

        /* MODAL POZA MARE - IMBUNATATIT PENTRU IPAD */
        #photo-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); z-index: 100000; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        #modal-img { max-width: 100%; max-height: 75vh; border-radius: 12px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); margin-bottom: 25px; }
        .btn-close-large { background: var(--danger); color: #fff; border: none; padding: 16px 40px; border-radius: 12px; font-size: 15px; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; box-shadow: 0 10px 20px rgba(255, 69, 58, 0.4); transition: 0.2s; display: flex; align-items: center; gap: 10px; }
        .btn-close-large:active { transform: scale(0.95); }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <div class="logo-box">VV</div>
            <div>
                <div style="font-size: 14px; font-weight: 600; letter-spacing: 0.5px;">CENTRAL COMMAND</div>
                <div style="font-size: 11px; color: var(--text-sec);">BETA V1.0</div>
            </div>
        </div>
        <div class="sys-status"><div class="dot-pulse"></div> SYSTEM SECURE & LIVE</div>
    </header>

    <div class="main-grid">
        <div class="side-panel">
            <div class="panel-header">Access & Control</div>
            <div class="panel-content">
                <div class="control-group">
                    <label>Generare Chei Acces</label>
                    <button class="btn btn-outline" onclick="generateKeys(1, 'STANDARD')" style="margin-bottom: 8px;">
                        <i class="fas fa-key"></i> Generează 1 Cheie Standard
                    </button>
                    <button class="btn btn-primary" onclick="generateKeys(1, 'PREMIUM')">
                        <i class="fas fa-crown"></i> Generează 1 Cheie Premium
                    </button>
                    <div class="key-list" id="keys-container">
                        </div>
                </div>

                <div style="height: 1px; background: var(--border); margin: 30px 0;"></div>

                <div class="control-group">
                    <label>Broadcast (Către toți agenții)</label>
                    <input type="text" id="broadcast-title" class="input-dark" placeholder="Titlu scurt (ex: URGENT)">
                    <textarea id="broadcast-msg" class="input-dark" style="height: 80px; resize: none;" placeholder="Mesajul transmis..."></textarea>
                    <button class="btn btn-outline" onclick="sendBroadcast()">
                        <i class="fas fa-broadcast-tower"></i> Emite Mesaj
                    </button>
                </div>
            </div>
        </div>

        <div class="map-container">
            <div id="admin-map"></div>
        </div>

        <div class="feed-panel">
            <div class="panel-header" style="display: flex; justify-content: space-between;">
                <span>Incoming Intel</span>
                <span id="intel-count" style="color:var(--primary);">0 Rapoarte</span>
            </div>
            <div class="feed-list" id="feed-container">
                <div style="text-align: center; color: var(--text-sec); font-size: 12px; margin-top: 50px;">
                    <i class="fas fa-satellite-dish" style="font-size: 24px; margin-bottom: 10px; opacity: 0.5;"></i><br>
                    Așteptare transmisii de pe teren...
                </div>
            </div>
        </div>
    </div>

    <div id="photo-modal" onclick="closePhotoModal()">
        <img id="modal-img" src="" onclick="event.stopPropagation()">
        <button class="btn-close-large" onclick="closePhotoModal()"><i class="fas fa-arrow-left"></i> ÎNAPOI LA PANOU</button>
    </div>

    <script>
        // --- CONFIGURARE FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyDGv4kEClO0RHCLvXVLOT-vyPHw6bsxYVc",
            authDomain: "vv-ep-beta.firebaseapp.com",
            projectId: "vv-ep-beta",
            storageBucket: "vv-ep-beta.firebasestorage.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // --- PROTOCOL AUTODISTRUGERE (24 ORE) ---
        async function runCleanSlateProtocol() {
            const twentyFourHoursAgo = Date.now() - (24 * 60 * 60 * 1000);
            try {
                const oldPhotos = await db.collection('photos').where('timestamp', '<', twentyFourHoursAgo).get();
                if(!oldPhotos.empty) {
                    const batch = db.batch();
                    oldPhotos.forEach(doc => batch.delete(doc.ref));
                    await batch.commit();
                }
            } catch(e) { console.error("Eroare la Clean Slate:", e); }
        }
        runCleanSlateProtocol();

        // --- HARTA TACTICA (LEAFLET) ---
        let adminMap = L.map('admin-map', {zoomControl: false}).setView([44.4325, 26.1038], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(adminMap);
        let mapMarkers = {};

        // --- SISTEM AFISARE CHEI ---
        db.collection('access_keys').orderBy('createdAt', 'desc').limit(10).onSnapshot(snap => {
            const container = document.getElementById('keys-container');
            container.innerHTML = '';
            snap.forEach(doc => {
                const data = doc.data();
                const usedClass = data.used ? 'used' : '';
                const badge = data.type === 'PREMIUM' ? '<span class="key-badge badge-premium">VIP</span>' : '<span class="key-badge" style="background:#333;color:#aaa;">STD</span>';
                container.innerHTML += `
                    <div class="key-item ${usedClass}" onclick="!${data.used} && copyToClipboard('${data.key}')" title="${data.used ? 'Folosită' : 'Click pt copiere'}">
                        <span>${data.key}</span>
                        ${badge}
                    </div>
                `;
            });
        });

        // --- SISTEM INCOMING INTEL ---
        db.collection('photos').orderBy('timestamp', 'desc').onSnapshot(async snap => {
            const container = document.getElementById('feed-container');
            if (snap.empty) {
                container.innerHTML = `<div style="text-align: center; color: var(--text-sec); font-size: 12px; margin-top: 50px;">Așteptare transmisii...</div>`;
                document.getElementById('intel-count').innerText = "0 Rapoarte";
                return;
            }

            container.innerHTML = '';
            document.getElementById('intel-count').innerText = `${snap.size} Rapoarte`;

            for (let id in mapMarkers) { adminMap.removeLayer(mapMarkers[id]); }
            mapMarkers = {};

            snap.forEach(doc => {
                const data = doc.data();
                const docId = doc.id;
                const time = new Date(data.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                const isUrgent = data.flagged ? '<div class="urgent-tag">URGENT</div>' : '';
                
                container.innerHTML += `
                    <div class="feed-item" id="item-${docId}">
                        <div class="feed-img-box">
                            <img src="${data.url}" onclick="openPhotoModal('${data.url}')" loading="lazy">
                            ${isUrgent}
                        </div>
                        <div class="feed-details">
                            <div class="feed-agent">
                                <span style="color:var(--primary); cursor:pointer;" onclick="focusOnMap(${data.lat || 44.43}, ${data.lng || 26.10})">📍 Zboară la Locație</span> 
                                <span>${time}</span>
                            </div>
                            <div class="feed-msg">${data.message || 'Fără mesaj.'}</div>
                            <div class="feed-actions">
                                <button class="btn-action del" onclick="deleteReport('${docId}')"><i class="fas fa-trash"></i> Șterge</button>
                            </div>
                        </div>
                    </div>
                `;

                if(data.lat && data.lng) {
                    let pinHtml = `<div class="tactical-pin"></div>`;
                    let customIcon = L.divIcon({ className: '', html: pinHtml, iconSize: [20, 20] });
                    let marker = L.marker([data.lat, data.lng], {icon: customIcon}).addTo(adminMap);
                    
                    marker.bindPopup(`
                        <div style="background:#000; padding:5px; border-radius:8px; text-align:center;">
                            <img src="${data.url}" style="width:150px; border-radius:4px; margin-bottom:5px; cursor:pointer;" onclick="openPhotoModal('${data.url}')">
                            <div style="color:#fff; font-size:10px;">${data.message ? data.message.substring(0,30)+'...' : 'Raport Teren'}</div>
                        </div>
                    `);
                    mapMarkers[docId] = marker;
                }
            });
        });

        // --- UTILS & MODALE ---
        function generateRandomString(len) { 
            const c = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'; let r = ''; 
            for(let i=0;i<len;i++) r+=c.charAt(Math.floor(Math.random()*c.length)); return r; 
        }
        
        async function generateKeys(count, type) { 
            let prefix = type === 'PREMIUM' ? 'VIP' : 'VV'; 
            for(let i=0; i<count; i++) {
                let formattedKey = `${prefix}-${generateRandomString(4)}-${generateRandomString(4)}`;
                await db.collection('access_keys').add({ key: formattedKey, type: type, used: false, createdAt: Date.now() }); 
            }
        }
        
        function copyToClipboard(txt) { navigator.clipboard.writeText(txt).then(() => alert('Codul a fost copiat.')); }

        function openPhotoModal(url) {
            document.getElementById('modal-img').src = url;
            document.getElementById('photo-modal').style.display = 'flex';
        }
        function closePhotoModal() { document.getElementById('photo-modal').style.display = 'none'; }
        
        async function deleteReport(docId) {
            if(confirm('Sigur vrei să ștergi acest raport definitiv?')) {
                await db.collection('photos').doc(docId).delete();
            }
        }

        function focusOnMap(lat, lng) { adminMap.flyTo([lat, lng], 16, {animate: true, duration: 1.5}); }

        async function sendBroadcast() {
            const t = document.getElementById('broadcast-title').value, m = document.getElementById('broadcast-msg').value;
            if(!t || !m) return alert("Completează titlul și mesajul.");
            await db.collection('system_broadcasts').add({ title: t, message: m, timestamp: Date.now(), active: true });
            alert("Emis cu succes."); document.getElementById('broadcast-title').value = ''; document.getElementById('broadcast-msg').value = '';
        }

    </script>
</body>
</html>
