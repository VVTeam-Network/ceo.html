<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE GARAGE | AI Builder</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --gold: #D4AF37; --bg: #000; --glass: rgba(255,255,255,0.05); }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: #fff; font-family: sans-serif; overflow: hidden; }
        
        /* PISTA DE RALIU (PREVIEW) */
        #pista-container { height: 50%; width: 100%; background: #111; border-bottom: 2px solid var(--gold); position: relative; }
        #live-frame { width: 100%; height: 100%; border: none; background: #000; }

        /* GARAJUL (EDITOR & AI) */
        #garaj-container { height: 50%; display: flex; flex-direction: column; background: #050505; padding: 15px; box-sizing: border-box; }
        
        .header-tools { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .status-dot { width: 8px; height: 8px; background: #34c759; border-radius: 50%; box-shadow: 0 0 10px #34c759; }
        
        #code-editor { flex: 1; background: #000; color: #34c759; border: 1px solid var(--glass); border-radius: 10px; padding: 10px; font-family: monospace; font-size: 12px; resize: none; outline: none; margin-bottom: 10px; }
        
        .controls { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 15px; border-radius: 12px; border: none; font-weight: 800; font-size: 12px; letter-spacing: 1px; cursor: pointer; text-transform: uppercase; }
        .btn-run { background: var(--gold); color: #000; }
        .btn-ai { background: #1a1a1a; color: #fff; border: 1px solid var(--glass); }

        /* MENTENANȚĂ RAPIDĂ (SLIDERS) */
        .quick-tune { display: flex; overflow-x: auto; gap: 10px; padding-bottom: 10px; }
        .tune-chip { background: #1a1a1a; padding: 5px 12px; border-radius: 20px; font-size: 10px; white-space: nowrap; border: 1px solid var(--glass); }
    </style>
</head>
<body>

    <div id="pista-container">
        <iframe id="live-frame"></iframe>
        <div style="position:absolute; top:10px; left:10px; background:rgba(0,0,0,0.7); padding:5px 10px; border-radius:5px; font-size:10px; color:var(--gold); border:1px solid var(--gold);">PISTA DE TEST ACTIVĂ</div>
    </div>

    <div id="garaj-container">
        <div class="header-tools">
            <div style="display:flex; align-items:center; gap:8px;"><div class="status-dot"></div><span style="font-size:11px; font-weight:800;">MECANIC AI: ONLINE</span></div>
            <i class="fas fa-cog" style="color:#555;"></i>
        </div>

        <div class="quick-tune">
            <div class="tune-chip" onclick="quickFix('bg-black')">FUNDAL NEGRU</div>
            <div class="tune-chip" onclick="quickFix('glass-effect')">EFECT STICLĂ</div>
            <div class="tune-chip" onclick="quickFix('pulse-anim')">LOGO PULSÂND</div>
        </div>

        <textarea id="code-editor" placeholder="Scrie codul sau lasă mecanicul AI să te ajute..."></textarea>

        <div class="controls">
            <button class="btn btn-ai" onclick="askAI()"><i class="fas fa-microphone"></i> COMANDĂ VOCALĂ</button>
            <button class="btn btn-run" onclick="updatePista()">LANSEAZĂ PE PISTĂ</button>
        </div>
    </div>

    <script>
        const editor = document.getElementById('code-editor');
        const frame = document.getElementById('live-frame');

        // ÎNCĂRCAREA INIȚIALĂ (O mostră mică de cod ca să avem ce vedea)
        editor.value = `<html>
<style>
  body { background: #000; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
  h1 { color: #D4AF37; animation: pulse 2s infinite; }
  @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
</style>
<body>
  <h1>VV 1.0 IN LUCRU...</h1>
</body>
</html>`;

        function updatePista() {
            const code = editor.value;
            const blob = new Blob([code], {type: 'text/html'});
            const url = URL.createObjectURL(blob);
            frame.src = url;
        }

        function askAI() {
            alert("Mecanicul AI te ascultă... (Conexiunea API urmează la Pasul 2)");
        }

        function quickFix(type) {
            alert("Aplic mentenanță pentru: " + type);
            // Aici vom injecta automat bucăți de cod premium
        }

        // Pornim pista la început
        window.onload = updatePista;
    </script>
</body>
</html>
